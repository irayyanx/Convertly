<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Convertly</title>
  <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700&display=swap" rel="stylesheet">
  <style>
    /* =====================================================================
       AMOLED Design System — Color Variables
       ===================================================================== */
    :root {
      --bg: #000000;
      --card-bg: #0A0A0A;
      --dropdown-bg: #121212;
      --input-bg: #121212;
      --border: #27272A;
      --hover: #18181B;
      --accent: #3B82F6;
      --accent-glow: rgba(59, 130, 246, 0.35);
      --success: #10B981;
      --success-glow: rgba(16, 185, 129, 0.35);
      --text: #FFFFFF;
      --text-muted: #A1A1AA;
      --tab-active: rgba(59, 130, 246, 0.15);
      --checkbox-bg: #27272A;
      --transition: all 0.25s cubic-bezier(0.4, 0, 0.2, 1);
    }

    [data-theme="light"] {
      --bg: #F8FAFC;
      --card-bg: #FFFFFF;
      --dropdown-bg: #FFFFFF;
      --input-bg: #F1F5F9;
      --border: #E2E8F0;
      --hover: #E2E8F0;
      --accent: #3B82F6;
      --accent-glow: rgba(59, 130, 246, 0.2);
      --success: #10B981;
      --success-glow: rgba(16, 185, 129, 0.2);
      --text: #0F172A;
      --text-muted: #64748B;
      --checkbox-bg: #CBD5E1;
    }

    /* =====================================================================
       Base & Scrollbar
       ===================================================================== */
    body {
      width: 360px; margin: 0;
      font-family: 'Tajawal', sans-serif;
      background: var(--bg); color: var(--text);
      overflow-x: hidden;
      transition: background 0.3s ease, color 0.3s ease;
    }
    body.rtl { direction: rtl; }
    body.rtl #btn-close-settings svg,
    body.rtl #btn-back-multi svg { transform: scaleX(-1); }

    ::-webkit-scrollbar { width: 5px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 10px; }
    ::-webkit-scrollbar-thumb:hover { background: var(--text-muted); }

    /* =====================================================================
       Animations
       ===================================================================== */
    @keyframes pop-success {
      0%   { transform: scale(1); }
      50%  { transform: scale(1.12); color: var(--accent); }
      100% { transform: scale(1); }
    }
    .pop-effect { animation: pop-success 0.3s ease-in-out; }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(6px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    /* =====================================================================
       Header
       ===================================================================== */
    .header-main {
      display: flex; justify-content: space-between; align-items: center;
      padding: 14px 18px;
      border-bottom: 1px solid var(--border);
      background: var(--bg);
    }
    .brand-title {
      font-weight: 700; font-size: 19px;
      color: #FBBF24;
      letter-spacing: -0.01em;
      text-shadow: 0 0 20px rgba(251, 191, 36, 0.4);
    }

    /* =====================================================================
       Nav Tabs
       ===================================================================== */
    .nav-tabs {
      display: flex; background: var(--card-bg);
      border-radius: 12px; padding: 3px;
      border: 1px solid var(--border);
      gap: 2px;
    }
    .nav-item {
      background: transparent; border: none; cursor: pointer;
      padding: 6px 14px; border-radius: 9px;
      color: var(--text-muted);
      transition: var(--transition);
      display: flex; align-items: center;
    }
    .nav-item.active {
      background: var(--hover);
      color: var(--text);
      box-shadow: 0 0 0 1px var(--border);
    }
    .nav-item:hover:not(.active) { color: var(--text); background: var(--hover); }
    .nav-item:active { transform: scale(0.93); }
    .nav-item svg { width: 18px; height: 18px; }

    /* =====================================================================
       Icon Buttons
       ===================================================================== */
    .header-actions { display: flex; gap: 6px; align-items: center; }
    .icon-btn {
      background: none; border: none; cursor: pointer;
      color: var(--text-muted); padding: 8px; border-radius: 10px;
      transition: var(--transition); display: flex;
    }
    .icon-btn:hover {
      background: var(--hover); color: var(--text);
      box-shadow: 0 0 12px var(--accent-glow);
      transform: translateY(-1px);
    }
    .icon-btn:active { transform: scale(0.93); box-shadow: none; }

    /* =====================================================================
       Views
       ===================================================================== */
    .view { display: none; padding: 18px; animation: fadeIn 0.22s ease; }
    .view.active { display: block; }

    /* =====================================================================
       Currency Selector Row
       ===================================================================== */
    .converter-row {
      display: flex; align-items: center; gap: 8px;
      margin-bottom: 18px; position: relative; z-index: 100;
    }
    .custom-select-container { flex: 1; position: relative; }

    .select-trigger {
      background: var(--card-bg); border: 1px solid var(--border);
      border-radius: 16px; padding: 10px 12px;
      display: flex; align-items: center; gap: 10px;
      cursor: pointer; height: 50px; box-sizing: border-box;
      transition: var(--transition);
    }
    .select-trigger:hover {
      border-color: var(--accent);
      box-shadow: 0 0 14px var(--accent-glow);
      transform: translateY(-1px);
    }
    .select-trigger:active { transform: scale(0.97); }

    .trigger-flag {
      width: 26px; height: 26px; border-radius: 50%;
      object-fit: cover; object-position: center;
      border: 1px solid var(--border); background: transparent;
      flex-shrink: 0; image-rendering: auto;
    }
    .trigger-flag.crypto-logo { object-fit: contain; padding: 2px; }
    .trigger-code { font-weight: 700; font-size: 15px; flex: 1; }

    .dropdown-menu {
      position: absolute; top: 110%; left: 0; width: 280px;
      background: var(--dropdown-bg); border: 1px solid var(--border);
      border-radius: 14px;
      box-shadow: 0 16px 48px rgba(0,0,0,0.8), 0 0 0 1px var(--border);
      padding: 10px; display: none; z-index: 999; text-align: left;
    }
    .dropdown-menu.active { display: block; animation: fadeIn 0.18s ease; }
    .custom-select-container:last-child .dropdown-menu { left: auto; right: 0; }
    body.rtl .dropdown-menu { text-align: right; left: auto; right: 0; }
    body.rtl .custom-select-container:last-child .dropdown-menu { right: auto; left: 0; }

    .search-box {
      width: 100%; padding: 10px 12px;
      background: var(--bg); border: 1px solid var(--border);
      border-radius: 10px; color: var(--text); font-size: 13px;
      outline: none; margin-bottom: 8px; box-sizing: border-box;
      font-family: 'Tajawal', sans-serif;
      transition: var(--transition);
    }
    .search-box:focus {
      outline: 2px solid var(--accent); outline-offset: 2px;
      border-color: transparent;
    }

    .options-list {
      max-height: 220px; overflow-y: auto;
      display: flex; flex-direction: column; gap: 2px; padding-right: 5px;
    }
    .option-item {
      display: flex; align-items: center; gap: 10px;
      padding: 8px 10px; border-radius: 9px; cursor: pointer;
      transition: background-color 0.2s ease, color 0.2s ease;
    }
    .option-item:hover {
      background: var(--hover);
    }

    .option-flag {
      width: 24px; height: 24px; border-radius: 50%;
      object-fit: cover; object-position: center;
      border: 1px solid var(--border); background: transparent;
      flex-shrink: 0; image-rendering: auto;
    }
    .option-flag.crypto-logo { object-fit: contain; padding: 2px; }

    /* =====================================================================
       Amount Input
       ===================================================================== */
    .input-wrapper {
      background: var(--card-bg); border: 1px solid var(--border);
      border-radius: 16px; padding: 16px; margin-bottom: 18px;
      transition: var(--transition);
    }
    .input-wrapper:focus-within {
      border-color: var(--accent);
      box-shadow: 0 0 18px var(--accent-glow);
    }
    .lbl {
      font-size: 11px; color: var(--text-muted); display: block;
      margin-bottom: 6px; font-weight: 600; letter-spacing: 0.05em;
      text-transform: uppercase;
    }
    #amount {
      width: 100%; background: transparent; border: none;
      font-size: 30px; font-weight: 700; color: var(--text);
      outline: none; font-family: inherit; letter-spacing: -0.02em;
    }

    /* =====================================================================
       Result
       ===================================================================== */
    .result-text {
      text-align: center; color: var(--accent);
      font-size: 26px; font-weight: 700;
      margin-bottom: 14px; min-height: 36px;
      letter-spacing: -0.02em;
      text-shadow: 0 0 24px var(--accent-glow);
      transition: var(--transition);
    }

    /* =====================================================================
       API Status Bar  — PRESERVE custom SVG chevron & RTL rules below
       ===================================================================== */
    .api-status-bar {
      display: flex; align-items: center; justify-content: space-between;
      padding: 8px 12px;
      background: var(--card-bg); border: 1px solid var(--border);
      border-radius: 12px; margin-bottom: 14px; font-size: 11px;
    }
    .api-status-left {
      display: flex; align-items: center; gap: 6px;
      color: var(--text-muted); font-weight: 600;
    }
    .api-status-dot { width: 7px; height: 7px; border-radius: 50%; flex-shrink: 0; }
    .api-status-dot.online  { background: var(--success); box-shadow: 0 0 8px var(--success-glow); }
    .api-status-dot.offline { background: #EF4444; box-shadow: 0 0 8px rgba(239,68,68,0.5); }

    /* — Custom SVG chevron select: DO NOT MODIFY padding/background-position — */
    .api-status-right select {
      background-color: var(--input-bg); border: 1px solid var(--border);
      border-radius: 6px; color: var(--text); font-size: 10px;
      padding: 3px 24px 3px 8px; font-family: inherit; cursor: pointer;
      outline: none; appearance: none; -webkit-appearance: none;
      background-image: url("data:image/svg+xml;charset=US-ASCII,%3Csvg%20xmlns%3D%22http%3A%2F%2Fwww.w3.org%2F2000%2Fsvg%22%20viewBox%3D%220%200%2024%2024%22%20fill%3D%22none%22%20stroke%3D%22%23A0A0A0%22%20stroke-width%3D%222.5%22%20stroke-linecap%3D%22round%22%20stroke-linejoin%3D%22round%22%3E%3Cpolyline%20points%3D%226%209%2012%2015%2018%209%22%2F%3E%3C%2Fsvg%3E");
      background-repeat: no-repeat; background-size: 12px;
      background-position: right 8px center;
      transition: border-color 0.2s ease, box-shadow 0.2s ease, background-color 0.2s ease;
    }
    .api-status-right select:focus {
      outline: none;
      border-color: var(--accent);
      box-shadow: 0 0 0 1px var(--accent), 0 0 12px var(--accent-glow);
    }
    /* — RTL flip: DO NOT MODIFY — */
    body.rtl .api-status-right select { padding: 3px 8px 3px 24px; background-position: left 8px center; }

    /* =====================================================================
       Footer
       ===================================================================== */
    .footer-bar {
      display: flex; justify-content: space-between; align-items: center;
      padding-top: 14px; border-top: 1px solid var(--border);
    }
    .branding-link {
      text-decoration: none; display: flex; align-items: center; gap: 4px;
      color: #FFDD00; font-weight: 700; font-size: 13px;
      background: rgba(255, 221, 0, 0.08); padding: 5px 12px;
      border-radius: 12px; border: 1px solid rgba(255, 221, 0, 0.18);
      transition: var(--transition);
    }
    .branding-link:hover {
      background: rgba(255, 221, 0, 0.18);
      box-shadow: 0 0 14px rgba(255, 221, 0, 0.25);
      transform: translateY(-1px);
    }
    .branding-link:active { transform: scale(0.96); }
    .branding-link img { width: 34px; height: auto; object-fit: contain; }

    .copyright-area {
      text-align: center; font-size: 10px; color: var(--text-muted);
      margin-top: 14px; border-top: 1px solid var(--border); padding-top: 10px;
    }

    /* =====================================================================
       Settings Panel
       ===================================================================== */
    .header-settings {
      display: flex; justify-content: space-between; align-items: center;
      margin-bottom: 24px;
    }
    .settings-title { font-weight: 700; font-size: 18px; letter-spacing: -0.01em; }

    .s-input, .s-select {
      width: 100%; padding: 12px 14px;
      background-color: var(--input-bg); border: 1px solid var(--border);
      border-radius: 12px; color: var(--text); font-size: 13px;
      outline: none; box-sizing: border-box; font-family: inherit;
    }
    /* s-input keeps full transition + outline-based focus ring (no native dropdown) */
    .s-input { transition: var(--transition); }
    .s-input:focus {
      outline: 2px solid var(--accent); outline-offset: 2px;
      border-color: transparent;
      box-shadow: 0 0 16px var(--accent-glow);
    }
    /* s-select: scoped transition + zero-geometry-shift focus ring */
    .s-select {
      transition: border-color 0.2s ease, box-shadow 0.2s ease, background-color 0.2s ease;
      cursor: pointer; appearance: none; -webkit-appearance: none;
      background-image: url("data:image/svg+xml;charset=US-ASCII,%3Csvg%20xmlns%3D%22http%3A%2F%2Fwww.w3.org%2F2000%2Fsvg%22%20viewBox%3D%220%200%2024%2024%22%20fill%3D%22none%22%20stroke%3D%22%23A0A0A0%22%20stroke-width%3D%222.5%22%20stroke-linecap%3D%22round%22%20stroke-linejoin%3D%22round%22%3E%3Cpolyline%20points%3D%226%209%2012%2015%2018%209%22%2F%3E%3C%2Fsvg%3E");
      background-repeat: no-repeat; background-position: right 14px center;
      background-size: 12px; padding-right: 36px;
    }
    .s-select:focus {
      outline: none;
      border-color: var(--accent);
      box-shadow: 0 0 0 1px var(--accent), 0 0 12px var(--accent-glow);
    }
    body.rtl .s-select { background-position: left 14px center; padding-right: 14px; padding-left: 36px; }

    .settings-section { margin-bottom: 20px; }
    .sec-label {
      display: block; font-size: 11px; color: var(--text-muted);
      margin-bottom: 8px; font-weight: 600;
      letter-spacing: 0.06em; text-transform: uppercase;
    }
    .sub-text { font-size: 10px; color: var(--text-muted); margin-top: 5px; }

    /* =====================================================================
       Multi-Currency Checklist
       ===================================================================== */
    .checklist-container {
      display: flex; flex-direction: column; gap: 8px;
      max-height: 400px; overflow-y: auto; padding-right: 8px;
    }
    body.rtl .checklist-container { padding-right: 0; padding-left: 8px; }

    .check-item {
      display: flex; justify-content: space-between; align-items: center;
      padding: 12px 14px; background: var(--card-bg);
      border-radius: 12px; border: 1px solid var(--border);
      cursor: pointer; transition: var(--transition);
    }
    .check-item:hover {
      border-color: var(--accent);
      box-shadow: 0 0 12px var(--accent-glow);
      transform: translateY(-1px);
    }
    .check-item:active { transform: scale(0.98); }
    .check-info { display: flex; align-items: center; gap: 12px; font-size: 13px; }
    .check-info img {
      width: 24px; height: 24px; border-radius: 50%; object-fit: cover;
      flex-shrink: 0; background: transparent; border: 1px solid var(--border);
    }

    .custom-checkbox {
      width: 20px; height: 20px; background: var(--checkbox-bg);
      border-radius: 6px; display: flex; align-items: center; justify-content: center;
      transition: var(--transition); flex-shrink: 0;
    }
    input[type="checkbox"]:checked + .custom-checkbox {
      background: var(--accent);
      box-shadow: 0 0 10px var(--accent-glow);
    }
    .custom-checkbox svg {
      width: 12px; height: 12px; stroke: #fff; stroke-width: 3;
      fill: none; opacity: 0; transition: var(--transition);
    }
    input[type="checkbox"]:checked + .custom-checkbox svg { opacity: 1; }
    .check-item input[type="checkbox"] { display: none; }

    /* =====================================================================
       Share Icons
       ===================================================================== */
    .share-row { display: flex; gap: 18px; margin-top: 10px; }
    .share-icon {
      width: 22px; height: 22px; fill: var(--text-muted);
      cursor: pointer; transition: var(--transition);
    }
    .share-icon:hover { fill: var(--text); transform: translateY(-2px); }
    .share-icon:active { transform: scale(0.92); }

    /* =====================================================================
       History UI
       ===================================================================== */
    .history-item {
      display: flex; flex-direction: column; gap: 6px;
      padding: 12px 14px; background: var(--card-bg);
      border-radius: 12px; border: 1px solid var(--border);
      cursor: pointer; transition: var(--transition);
    }
    .history-item:hover {
      border-color: var(--accent);
      box-shadow: 0 0 14px var(--accent-glow);
      transform: translateY(-1px);
    }
    .history-item:active { transform: scale(0.98); }
    .history-time { font-size: 10px; color: var(--text-muted); }
    .history-link {
      cursor: pointer; transition: var(--transition);
      display: inline-flex; align-items: center; gap: 4px;
    }
    .history-link:hover { opacity: 0.7; text-decoration: underline; }

    /* Accordion group headers */
    .history-group-header {
      display: flex; align-items: center; gap: 6px;
      font-size: 11px; font-weight: 700; color: var(--text-muted);
      padding: 8px 4px 6px; margin-top: 4px;
      border-bottom: 1px solid var(--border);
      cursor: pointer; user-select: none;
      transition: color 0.2s ease;
      letter-spacing: 0.05em; text-transform: uppercase;
    }
    .history-group-header:hover { color: var(--text); }
    .history-group-header .chevron { transition: transform 0.25s ease; display: inline-flex; margin-left: auto; }
    body.rtl .history-group-header .chevron { margin-left: 0; margin-right: auto; }
    .history-group-header.collapsed .chevron { transform: rotate(-90deg); }
    .history-group-items { display: flex; flex-direction: column; gap: 6px; padding-top: 4px; }
  </style>

</head>

      </div>

    <div class="input-wrapper"><span class="lbl" data-i18n="lblAmount">Amount</span><input type="text" id="amount" placeholder="1000"></div>
    <div class="result-text" id="resultText">...</div>

    <div class="api-status-bar">

        <span class="api-status-dot online" id="api-dot"></span>
        <span id="api-status-text"></span>

    <div class="copyright-area" id="version-footer">Convertly</div>

        <button id="btn-clear-history" style="background:none; border:none; color:#ef4444; font-size:12px; cursor:pointer; font-weight:bold; font-family: inherit;" data-i18n="clearHistory">Clear</button>
    </div>
    <div id="history-list" style="display:flex; flex-direction:column; gap:8px; max-height:400px; overflow-y:auto; padding-right:5px;"></div>
  </div>

  <div id="view-settings" class="view">
    <div class="header-settings"><div style="width:24px"></div><div class="settings-title" data-i18n="settingsTitle">Settings</div><button class="icon-btn" id="btn-close-settings"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="6" x2="6" y2="18"></line><line x1="6" y1="6" x2="18" y2="18"></line></svg></button></div>
    
    <div class="settings-section"><span class="sec-label" data-i18n="secNumFormat">Number Format</span><input type="text" class="s-input" id="format-preview" value="12,345.68" readonly></div>

    <div class="settings-section">
      <span class="sec-label" data-i18n="secOnPage">On-page Conversion</span>
      <select id="on-page-mode-select" class="s-select"><option value="disabled" data-i18n="optDisabled">Disabled</option><option value="single" data-i18n="optSingle">Single Currency</option><option value="multi" data-i18n="optMulti">Multiple Currencies</option></select>
      <div class="sub-text" data-i18n="subOnPage">Convert selected amount in single or multiple currencies.</div>
      <button id="btn-edit-list" style="margin-top:10px; width:100%; padding:8px; background:var(--card-bg); border:1px solid var(--border); color:var(--text); border-radius:6px; cursor:pointer; font-size:12px; display:none;" data-i18n="btnEditList">Edit Currency List</button>
    </div>
    <div class="settings-section"><span class="sec-label" data-i18n="secLang">Language</span><select class="s-select" id="lang-select"><option value="en">English</option><option value="ar">العربية (Arabic)</option></select></div>
    <div class="settings-section"><span class="sec-label" data-i18n="secShortcut">Shortcut</span><input type="text" class="s-input" value="Alt + Q" readonly></div>
