name: Release (auto)

on:
  push:
    branches: ["main"]

permissions:
  contents: write
  pull-requests: write

jobs:
  release-please:
    runs-on: ubuntu-latest
    outputs:
      release_created: ${{ steps.rp.outputs.release_created }}
      tag_name: ${{ steps.rp.outputs.tag_name }}
      version: ${{ steps.rp.outputs.version }}
    steps:
      - name: Release Please
        id: rp
        uses: googleapis/release-please-action@v4
        with:
          release-type: simple
          config-file: release-please-config.json
          manifest-file: release-please-manifest.json

  build-and-upload:
    needs: release-please
    if: ${{ needs.release-please.outputs.release_created == 'true' }}
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set version
        run: echo "VERSION=${{ needs.release-please.outputs.version }}" >> $GITHUB_ENV

      - name: Build Chrome & Firefox zips
        run: |
          set -e
          sudo apt-get update -y
          sudo apt-get install -y jq rsync zip

          mkdir -p dist/chrome dist/firefox

          rsync -av \
            --exclude='.git' \
            --exclude='.github' \
            --exclude='dist' \
            --exclude='manifest.chrome.json' \
            --exclude='manifest.firefox.json' \
            ./ dist/chrome/

          rsync -av \
            --exclude='.git' \
            --exclude='.github' \
            --exclude='dist' \
            --exclude='manifest.chrome.json' \
            --exclude='manifest.firefox.json' \
            ./ dist/firefox/

          jq --arg v "$VERSION" '.version=$v' manifest.chrome.json > dist/chrome/manifest.json
          jq --arg v "$VERSION" '.version=$v' manifest.firefox.json > dist/firefox/manifest.json

          cd dist/chrome
          zip -r "../convertly-chrome-v$VERSION.zip" .
          cd ../firefox
          zip -r "../convertly-firefox-v$VERSION.zip" .

      - name: Upload release assets
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.release-please.outputs.tag_name }}
          files: |
            dist/convertly-chrome-v${{ env.VERSION }}.zip
            dist/convertly-firefox-v${{ env.VERSION }}.zip
