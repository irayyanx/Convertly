name: Release (auto)

on:
  push:
    branches: ["main"]

permissions:
  contents: write
  pull-requests: write

jobs:
  release-please:
    runs-on: ubuntu-latest
    outputs:
      release_created: ${{ steps.rp.outputs.release_created }}
      tag_name: ${{ steps.rp.outputs.tag_name }}
      version: ${{ steps.rp.outputs.version }}
    steps:
      - name: Release Please
        id: rp
        uses: googleapis/release-please-action@v4
        with:
          release-type: simple
          config-file: release-please-config.json
          manifest-file: release-please-manifest.json

  build-and-upload:
    needs: release-please
    if: ${{ needs.release-please.outputs.release_created == 'true' }}
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set version
        run: echo "VERSION=${{ needs.release-please.outputs.version }}" >> $GITHUB_ENV

      - name: Build Chrome & Firefox zips
        run: |
          set -e
          sudo apt-get update -y
          sudo apt-get install -y jq rsync zip imagemagick

          mkdir -p dist/chrome dist/firefox
          
          # 1. Base files from src/
          rsync -av ./src/ dist/chrome/
          rsync -av ./src/ dist/firefox/

          # 2. Browser specific overrides
          rsync -av ./platforms/chrome/ dist/chrome/
          rsync -av ./platforms/firefox/ dist/firefox/

          # 3. Inject Version into Manifests
          jq --arg v "$VERSION" '.version=$v' dist/chrome/manifest.json > dist/chrome/manifest_tmp.json && mv dist/chrome/manifest_tmp.json dist/chrome/manifest.json
          jq --arg v "$VERSION" '.version=$v' dist/firefox/manifest.json > dist/firefox/manifest_tmp.json && mv dist/firefox/manifest_tmp.json dist/firefox/manifest.json

          # 4. Generate exact icon sizes for Firefox
          convert ./src/icon.png -resize 16x16 dist/firefox/icon16.png
          convert ./src/icon.png -resize 48x48 dist/firefox/icon48.png
          convert ./src/icon.png -resize 128x128 dist/firefox/icon128.png

          # 5. Zip outputs
          cd dist/chrome
          zip -r "../convertly-chrome-v$VERSION.zip" .
          cd ../firefox
          zip -r "../convertly-firefox-v$VERSION.zip" .

      - name: Upload release assets
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.release-please.outputs.tag_name }}
          files: |
            dist/convertly-chrome-v${{ env.VERSION }}.zip
            dist/convertly-firefox-v${{ env.VERSION }}.zip
